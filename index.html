<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>GenArt - Real-Time Projection Mapping</title>
  <style>
    html, body { margin: 0; padding: 0; background: #111; overflow: hidden; width: 100%; height: 100%; }
    /* All visible layers fill the viewport */
    #physicsCanvas, #debugCanvas, #webglCanvas, #video {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      display: block;
    }
    #physicsCanvas {
      z-index: 1;
      pointer-events: none;
      background: transparent;
    }
    #webglCanvas {
      z-index: 2;
      pointer-events: none;
      background: transparent;
      display: none;
    }
    #debugCanvas {
      z-index: 10;
      pointer-events: auto;
      touch-action: none;
    }
    #video {
      z-index: 0;
      background: #111;
    }
  </style>
  <!-- OpenCV.js CDN -->
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
  <!-- Matter.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.19.0/build/matter.min.js"></script>
</head>
<body>
  <div id="cameraError" style="display:none;color:#fff;background:#c00;padding:10px;z-index:200;position:absolute;top:0;left:0;width:100%;text-align:center;font-weight:bold;"></div>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="captureCanvas" style="display:none"></canvas>
  <canvas id="physicsCanvas"></canvas>
  <canvas id="webglCanvas"></canvas>
  <canvas id="debugCanvas"></canvas>
  <script type="module" src="./main.js"></script>
</body>
</html>
