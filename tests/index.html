<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GenArt — Test Suite</title>
  <style>
    html, body { margin: 0; padding: 0; background: #1a1a1a; color: #eee; font-family: monospace; }
    h1 { text-align: center; padding: 16px; margin: 0; color: #6cf; font-size: 20px; }
    #results { max-width: 800px; margin: 0 auto; padding-bottom: 40px; }
    #status { text-align: center; padding: 10px; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>
  <h1>🧪 GenArt Test Suite</h1>
  <div id="status">Running tests…</div>
  <div id="results"></div>

  <script type="module">
    import { runAll } from './testRunner.js';

    // Import all test modules (each self-registers via describe/it)
    await import('./config.test.js');
    await import('./pluginSystem.test.js');
    await import('./stabilizer.test.js');
    await import('./storage.test.js');
    await import('./contourProcessor.test.js');
    await import('./webglRenderer.test.js');

    const { passed, failed, total } = await runAll();
    document.getElementById('status').textContent =
      `Done: ${passed}/${total} passed` + (failed > 0 ? ` — ${failed} failed` : ' ✓');
  </script>
</body>
</html>
