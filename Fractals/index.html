<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>GenArt Fractals — Real-Time Surface-Driven Fractal Projection</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; overflow: hidden; width: 100%; height: 100%; }
    /* All visible layers fill the viewport */
    #fractalCanvas, #debugCanvas, #video {
      position: absolute; top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      display: block;
    }
    #fractalCanvas {
      z-index: 1;
      background: #000;
    }
    #debugCanvas {
      z-index: 10;
      pointer-events: auto;
      touch-action: none;
      background: transparent;
    }
    #video {
      z-index: 0;
      background: #000;
      display: none; /* hidden by default for projection */
    }
  </style>
  <!-- OpenCV.js CDN -->
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
</head>
<body>
  <div id="cameraError" style="display:none;color:#fff;background:#c00;padding:10px;z-index:200;position:absolute;top:0;left:0;width:100%;text-align:center;font-weight:bold;"></div>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="captureCanvas" style="display:none"></canvas>
  <canvas id="fractalCanvas"></canvas>
  <canvas id="debugCanvas"></canvas>
  <script type="module" src="main.js"></script>
</body>
</html>
